<svg xmlns="http://www.w3.org/2000/svg"
width="900"
height="430"
viewBox="0 0 900 430"
fill="none"
role="img"
aria-label="Logo SteehPixel roxo metalizado">

<defs>
  <linearGradient id="metalPurple" x1="0" y1="0" x2="900" y2="430" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2B004F"/>
    <stop offset="12%" stop-color="#4B0082"/>
    <stop offset="25%" stop-color="#7B2CBF"/>
    <stop offset="40%" stop-color="#C77DFF"/>
    <stop offset="52%" stop-color="#F0C9FF"/>
    <stop offset="63%" stop-color="#9D4EDD"/>
    <stop offset="78%" stop-color="#5A189A"/>
    <stop offset="100%" stop-color="#E0AAFF"/>
  </linearGradient>

  <linearGradient id="metalStroke" x1="0" y1="0" x2="0" y2="430" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#F3D9FF"/>
    <stop offset="30%" stop-color="#C77DFF"/>
    <stop offset="65%" stop-color="#3C096C"/>
    <stop offset="100%" stop-color="#9D4EDD"/>
  </linearGradient>

  <filter id="purpleShadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#240046" flood-opacity="0.7"/>
  </filter>
</defs>

<g filter="url(#purpleShadow)">
  <text x="450" y="175"
        text-anchor="middle"
        font-family="Poppins, Montserrat, Arial, Helvetica, sans-serif"
        font-size="180"
        font-weight="900"
        letter-spacing="-12"
        fill="url(#metalPurple)"
        stroke="url(#metalStroke)"
        stroke-width="3">
    SP
  </text>

  <text x="450" y="360"
        text-anchor="middle"
        font-family="Poppins, Montserrat, Arial, Helvetica, sans-serif"
        font-size="145"
        font-weight="900"
        letter-spacing="-8"
        fill="url(#metalPurple)"
        stroke="url(#metalStroke)"
        stroke-width="2.5">
    SteehPixel
  </text>
</g>

</svg>
