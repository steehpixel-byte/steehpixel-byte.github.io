<svg width="520" height="120" viewBox="0 0 520 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleMetal" x1="0" y1="0" x2="520" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2B004F"/>
      <stop offset="18%" stop-color="#5A189A"/>
      <stop offset="34%" stop-color="#7B2CBF"/>
      <stop offset="50%" stop-color="#C77DFF"/>
      <stop offset="64%" stop-color="#9D4EDD"/>
      <stop offset="82%" stop-color="#4B0082"/>
      <stop offset="100%" stop-color="#E0AAFF"/>
    </linearGradient>

    <linearGradient id="metalHighlight" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0AAFF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#7B2CBF" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#F3D9FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3C096C" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#9D4EDD" flood-opacity="0.65"/>
    </filter>
  </defs>

  <text x="12" y="78"
        font-family="Poppins, Montserrat, Arial, Helvetica, sans-serif"
        font-size="72"
        font-weight="800"
        letter-spacing="-3"
        fill="url(#purpleMetal)"
        stroke="url(#metalHighlight)"
        stroke-width="1.2"
        filter="url(#softGlow)">
    SteehPixel
  </text>

  <path d="M20 25 H500"
        stroke="url(#metalHighlight)"
        stroke-width="2"
        opacity="0.28"/>

  <path d="M22 42 H498"
        stroke="#E0AAFF"
        stroke-width="1"
        opacity="0.18"/>
</svg>
